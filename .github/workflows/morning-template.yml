name: Morning Template

on:
  schedule:
    # 北京时间9:00 = UTC 1:00
    - cron: '0 1 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  send-morning-template:
    runs-on: ubuntu-latest
    steps:
      - name: Send Morning Template to DingTalk
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "msgtype": "markdown",
              "markdown": {
                "title": "DIMI晨间模板 - '"$(date +%Y-%m-%d)"'",
                "text": "## 🌅 DIMI晨间模板 ('"$(date +%Y-%m-%d)"')\n\n### 💤 昨晚睡眠\n- 睡眠时长：____小时\n- 清醒比例：____%\n- REM比例：____%\n- 浅睡比例：____%\n- 深睡比例：____%\n- 清醒5分钟次数：____次\n- 静息心率：____bpm\n\n### 📊 生理指标\n- HRV：____ms\n- 体重：____kg\n- 体脂率：____%\n\n### 🏋️ 今日训练\n- 训练类型：____\n- 目标强度：____\n- 预计时长：____分钟\n\n### 💪 身体状态\n- 疲劳程度：____/10\n- 肌肉酸痛：____/10\n- 精神状态：____/10\n\n### 🎯 今日目标\n1. ____\n2. ____\n3. ____\n\n> 💡 请填写后访问：https://dimi-sleep-form.vercel.app/"
              }
            }' \
            https://oapi.dingtalk.com/robot/send?access_token=238cbb8ff13ea9a2ac8567a4e2c185303804906107d9bc73bb209e5584c211c9
