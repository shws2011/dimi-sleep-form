name: Morning Template

on:
  schedule:
    # 北京时间9:00 = UTC 1:00（提前2小时以补偿延迟，实际约9:00-11:00收到）
    - cron: '0 23 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  send-morning-template:
    runs-on: ubuntu-latest
    steps:
      - name: Send Morning Template to DingTalk
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "msgtype": "text",
              "text": {
                "content": "🌅 睡眠数据收集\n\n请复制以下模板并填写今日的睡眠数据，然后发送给我：\n\n睡眠数据\n日期: '"$(date +%Y-%m-%d)"'\n睡眠时间: \n清醒: \nREM: \n浅睡: \n深睡: \nHRV值: \n体力恢复: \n静息心率: \n压力: \n主观疲劳感: \n体重: \n体脂率: \n备注: "
              }
            }' \
            "https://oapi.dingtalk.com/robot/send?access_token=238cbb8ff13ea9a2ac8567a4e2c185303804906107d9bc73bb209e5584c211c9"
