name: Morning Template

on:
  schedule:
    # 北京时间9:00 = UTC 1:00（提前2小时以补偿延迟，实际约9:00-11:00收到）
    - cron: '0 23 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  send-morning-template:
    runs-on: ubuntu-latest
    steps:
      - name: Send Morning Template to DingTalk
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "msgtype": "markdown",
              "markdown": {
                "title": "🌅 睡眠数据收集",
                "text": "## 🌅 睡眠数据收集\n\n请复制以下模板并填写今日的睡眠数据，然后发送给我：\n\n```\n睡眠数据\n日期: '"$(date +%Y-%m-%d)"'\nHRV值: \n平均心率: \n静息心率: \n压力: \n睡眠心率: \n睡眠时间: \n清醒: \nREM: \n浅睡: \n深睡: \n体重: \n体脂率: \n备注: \n```\n\n**填写说明：**\n- 日期：自动填充为今天的日期\n- HRV值：心率变异性，数值越高越好\n- 平均心率：全天平均心率\n- 静息心率：早晨起床前的心率\n- 压力：压力水平评分（0-100）\n- 睡眠心率：睡眠期间的平均心率\n- 睡眠时间：格式为 \"HH:MM-HH:MM\"，例如 \"23:00-06:00\"\n- 清醒/REM/浅睡/深睡：各阶段睡眠占比，单位为百分比\n- 体重：单位为KG\n- 体脂率：单位为百分比\n- 备注：其他需要说明的情况\n\n**提交方式：**\n1. 复制上面的模板\n2. 填写完整数据\n3. 发送给我（小C、小T或钉钉联通机器人均可）\n\n数据提交成功后，我会为您分析睡眠质量并提供训练建议！"
              }
            }' \
            `https://oapi.dingtalk.com/robot/send?access_token=238cbb8ff13ea9a2ac8567a4e2c185303804906107d9bc73bb209e5584c211c9`
