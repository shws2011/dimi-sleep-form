name: DIMI Training Reminder

on:
  schedule:
    - cron: '0 3 * * 1-5'  # 周一到周五 11:00
    - cron: '0 1 * * 6'    # 周六 9:00
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Send training reminder
        run: |
          python << 'EOF'
          import requests
          import base64
          import datetime
          import json
          import traceback
          
          try:
              # 配置
              token = "ed4425ff9eae674d02248852bcb8fd63"  # 替换为真实token
              webhook = "https://oapi.dingtalk.com/robot/send?access_token=238cbb8ff13ea9a2ac8567a4e2c185303804906107d9bc73bb209e5584c211c9"
              
              # 日期计算
              today = datetime.datetime.now()
              week_num = today.isocalendar()[1]
              weekday = today.weekday()
              weekdays = ["周一", "周二", "周三", "周四", "周五", "周六", "周日"]
              today_cn = weekdays[weekday]
              
              # 读取1RM数据
              try:
                  url = "https://gitee.com/api/v5/repos/shws2011/dimi/contents/memory/fitness/training_data/1rm_data.json"
                  headers = {"Authorization": f"token {token}"}
                  response = requests.get(url, headers=headers, timeout=10)
                  if response.status_code == 200:
                      content = base64.b64decode(response.json()["content"]).decode("utf-8")
                      rm_data = json.loads(content)["1rm_data"]
                      print("✅ 成功读取1RM数据")
                  else:
                      rm_data = {}
                      print(f"⚠️  读取1RM数据失败: {response.status_code}")
              except Exception as e:
                  rm_data = {}
                  print(f"⚠️  读取1RM数据异常: {str(e)}")
              
              # 读取周计划
              try:
                  url = f"https://gitee.com/api/v5/repos/shws2011/dimi/contents/memory/fitness/weekly/{today.year}-W{week_num}.md"
                  headers = {"Authorization": f"token {token}"}
                  response = requests.get(url, headers=headers, timeout=10)
                  
                  if response.status_code == 200:
                      content = base64.b64decode(response.json()["content"]).decode("utf-8")
                      lines = content.split("\n")
                      
                      # 解析计划
                      plan = {"title": "", "strength": [], "wod": [], "alternate": [], "extra": "", "recovery": ""}
                      section = "title"
                      
                      for line in lines:
                          line = line.strip()
                          if f"## {today_cn}" in line:
                              section = "strength"
                              plan["title"] = line.replace("##", "").strip()
                          elif line.startswith("## ") and today_cn not in line:
                              break
                          elif section == "strength" and "WOD:" in line:
                              section = "wod"
                              plan["wod"].append(line)
                          elif section == "wod" and "Level" in line:
                              section = "alternate"
                              plan["alternate"].append(line)
                          elif section == "alternate" and "加练" in line:
                              section = "extra"
                          elif section == "extra" and "恢复" in line:
                              section = "recovery"
                          elif section == "strength" and line:
                              # 计算1RM
                              if "1RM" in line:
                                  if "Front Squat" in line and "front_squat" in rm_data:
                                      rm = rm_data["front_squat"]
                                      line = line.replace("1RM", f"{rm}kg")
                                  elif "Bench Press" in line and "bench_press" in rm_data:
                                      rm = rm_data["bench_press"]
                                      line = line.replace("1RM", f"{rm}kg")
                                  elif "Clean & Jerk" in line and "clean_jerk" in rm_data:
                                      rm = rm_data["clean_jerk"]
                                      line = line.replace("1RM", f"{rm}kg")
                                  elif "Push Press" in line and "push_press" in rm_data:
                                      rm = rm_data["push_press"]
                                      line = line.replace("1RM", f"{rm}kg")
                                  elif "Snatch" in line and "snatch" in rm_data:
                                      rm = rm_data["snatch"]
                                      line = line.replace("1RM", f"{rm}kg")
                              plan["strength"].append(line)
                          elif section == "wod" and line:
                              plan["wod"].append(line)
                          elif section == "alternate" and line:
                              plan["alternate"].append(line)
                          elif section == "extra" and "主动恢复" in line:
                              plan["extra"] = line
                          elif section == "recovery" and line:
                              plan["recovery"] = line
                      
                      # 生成消息
                      message = f"DIMI训练提醒 ({today.strftime('%Y-%m-%d')} {plan['title']})\n\n"
                      
                      if plan["strength"]:
                          message += "### 1. 力量训练\n"
                          for item in plan["strength"]:
                              message += f"{item}\n"
                          message += "\n"
                      
                      if plan["wod"]:
                          message += "### 2. WOD\n"
                          for item in plan["wod"]:
                              message += f"{item}\n"
                          message += "\n"
                      
                      if plan["alternate"]:
                          message += "### 3. 备选方案\n"
                          for item in plan["alternate"]:
                              message += f"{item}\n"
                          message += "\n"
                      
                      if plan["extra"]:
                          message += f"### 4. 课后加练\n{plan['extra']}\n\n"
                      
                      if plan["recovery"]:
                          message += f"### 5. 恢复重点\n{plan['recovery']}\n\n"
                      
                      message += "💪 加油！"
                      print("✅ 成功生成训练计划")
                  else:
                      message = "本周训练计划未设置，请发送本周计划。"
                      print(f"⚠️  读取周计划失败: {response.status_code}")
              except Exception as e:
                  message = "读取周计划时发生错误"
                  print(f"⚠️  读取周计划异常: {str(e)}")
              
              # 发送钉钉
              try:
                  payload = {
                      "msgtype": "text",
                      "text": {"content": message}
                  }
                  response = requests.post(webhook, json=payload, timeout=10)
                  if response.status_code == 200:
                      print("✅ 钉钉消息发送成功")
                      print(f"消息内容:\n{message}")
                  else:
                      print(f"❌ 钉钉消息发送失败: {response.status_code}")
                      print(f"响应: {response.text}")
              except Exception as e:
                  print(f"❌ 发送钉钉异常: {str(e)}")
                  
          except Exception as e:
              print(f"❌ 脚本执行失败: {str(e)}")
              print(traceback.format_exc())
              # 不抛出异常，避免整个工作流失败
              print("⚠️  脚本执行异常，但工作流继续")
          
          print("✅ 训练提醒任务完成")
          EOF
