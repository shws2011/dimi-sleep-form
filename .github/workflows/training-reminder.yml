name: Training Reminder

on:
  schedule:
    - cron: '0 1 * * 1-5'  # 工作日 UTC 01:00（北京时间09:00）
    - cron: '0 23 * * 6'   # 周六 UTC 23:00（北京时间07:00）
  workflow_dispatch:  # 手动触发

env:
  GITEE_TOKEN: 'ed4425ff9eae674d02248852bcb8fd63'
  DINGTALK_WEBHOOK: 'https://oapi.dingtalk.com/robot/send?access_token=238cbb8ff13ea9a2ac8567a4e2c185303804906107d9bc73bb209e5584c211c9'

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Generate and send training reminder
        env:
          GITEE_TOKEN: ${{ env.GITEE_TOKEN }}
          DINGTALK_WEBHOOK: ${{ env.DINGTALK_WEBHOOK }}
        run: |
          python << 'EOF'
          import os, sys, json, re, requests, base64
          from datetime import datetime

          # 从JSON文件读取1RM数据
          RM_DATA = {}
          try:
              with open('memory/fitness/training_data/1rm_data.json', 'r', encoding='utf-8') as f:
                  rm_data = json.load(f)
                  RM_DATA = rm_data.get("1rm_data", {})
                  print(f"✓ 从JSON文件加载1RM数据: {list(RM_DATA.keys())}")
          except Exception as e:
              print(f"⚠️ 无法从JSON文件读取1RM数据: {e}")
              # 使用默认值
              RM_DATA = {
                  "front_squat": 90,
                  "bench_press": 80,
                  "clean_jerk": 50,
                  "push_press": 55,
                  "snatch": 50,
                  "squat_clean": 70,
                  "back_squat": 110,
                  "deadlift": 120
              }
              print("✓ 使用默认1RM数据")

          # 检查必要的环境变量
          token = os.environ.get("GITEE_TOKEN")
          dingtalk_webhook = os.environ.get("DINGTALK_WEBHOOK")

          if not token:
              print("错误: GITEE_TOKEN未设置")
              sys.exit(1)

          if not dingtalk_webhook:
              print("错误: DINGTALK_WEBHOOK未设置")
              sys.exit(1)

          # 获取本周训练计划文件
          today = datetime.now()
          year, week_num, _ = today.isocalendar()
          file_path = f"memory/fitness/weekly/{year}-W{week_num:02d}.md"

          url = f"https://gitee.com/api/v5/repos/shws2011/dimi/contents/{file_path}"
          params = {"access_token": token, "ref": "main"}

          try:
              response = requests.get(url, params=params, timeout=10)
              if response.status_code == 200:
                  data = response.json()
                  content = base64.b64decode(data.get("content", "")).decode('utf-8')
                  print(f"✓ 成功获取训练计划文件: {file_path}")
              else:
                  print(f"✗ 无法获取计划文件: HTTP {response.status_code}")
                  print(f"响应: {response.text[:200]}")
                  sys.exit(1)
          except Exception as e:
              print(f"✗ 获取计划文件异常: {e}")
              sys.exit(1)

          # 解析今日计划
          chinese_weekdays = ["周一", "周二", "周三", "周四", "周五", "周六", "周日"]
          target_weekday_cn = chinese_weekdays[today.weekday()]
          print(f"✓ 今日: {target_weekday_cn}")

          lines = content.split('\n')
          daily_content = []
          in_target_section = False

          for line in lines:
              line_stripped = line.strip()
              if f"## {target_weekday_cn}" in line_stripped:
                  in_target_section = True
                  continue
              
              if in_target_section and line_stripped.startswith('## ') and target_weekday_cn not in line_stripped:
                  break
              
              if in_target_section:
                  daily_content.append(line)

          if not daily_content:
              print(f"✗ 未找到今日训练计划 ({target_weekday_cn})")
              simple_message = f"🏋️ DIMI训练提醒 ({today.strftime('%Y-%m-%d')} {target_weekday_cn})\n\n今日训练计划未找到，请检查周计划文件。\n\n💪 加油！"
              payload = {
                  "msgtype": "markdown",
                  "markdown": {
                      "title": "训练提醒",
                      "text": simple_message
                  }
              }
              
              try:
                  resp = requests.post(dingtalk_webhook, json=payload, timeout=10)
                  if resp.status_code == 200:
                      print("✓ 已发送简单提醒消息")
                  else:
                      print(f"✗ 发送失败: HTTP {resp.status_code}")
              except Exception as e:
                  print(f"✗ 发送消息异常: {e}")
              
              sys.exit(0)

          plan_text = '\n'.join(daily_content)
          print(f"✓ 提取到计划内容: {len(plan_text)}字符")

          # 提取各部分
          def extract_section(title, text):
              lines = text.split('\n')
              section_lines = []
              in_section = False
              
              for line in lines:
                  line_stripped = line.strip()
                  if f"### {title}" in line_stripped:
                      in_section = True
                      continue
                  
                  if in_section and line_stripped.startswith('### '):
                      break
                  
                  if in_section:
                      section_lines.append(line)
              
              return '\n'.join(section_lines).strip()

          gym_plan = extract_section("场馆计划", plan_text)
          extra_plan = extract_section("课后加练", plan_text)
          recovery_plan = extract_section("恢复重点", plan_text)
          notes_plan = extract_section("练习要点", plan_text)

          print(f"✓ 解析成功: 场馆计划({len(gym_plan)}字符), 课后加练({len(extra_plan)}字符), 恢复重点({len(recovery_plan)}字符)")

          # 计算1RM百分比
          def calculate_weights(text):
              if not text:
                  return text
              
              rm_map = {
                  'front squat': 'front_squat',
                  'bench press': 'bench_press',
                  'clean & jerk': 'clean_jerk',
                  'push press': 'push_press',
                  'snatch': 'snatch',
                  'squat clean': 'squat_clean',
                  'back squat': 'back_squat',
                  'deadlift': 'deadlift'
              }
              
              # 匹配多种格式
              patterns = [
                  r'(\d+)-?(\d+)?%\s*1RM',
                  r'(\d+)%1RM'
              ]
              
              def replace(match):
                  if len(match.groups()) == 2:
                      min_pct = match.group(1)
                      max_pct = match.group(2) or min_pct
                      
                      # 尝试找到对应的动作
                      line = match.string
                      exercise_name = ""
                      for key in rm_map.keys():
                          if key in line.lower():
                              exercise_name = key
                              break
                      
                      if exercise_name:
                          exercise_key = rm_map[exercise_name]
                          if exercise_key in RM_DATA:
                              rm = RM_DATA[exercise_key]
                              min_weight = round(float(rm) * float(min_pct) / 100 / 2.5) * 2.5
                              max_weight = round(float(rm) * float(max_pct) / 100 / 2.5) * 2.5
                              
                              # 优化显示格式
                              if min_pct == max_pct:
                                  return f"{min_pct}% 1RM ({min_weight}kg)"
                              else:
                                  return f"{min_pct}-{max_pct}% 1RM ({min_weight}-{max_weight}kg)"
                      return match.group(0)
                  elif len(match.groups()) == 1:
                      pct = match.group(1)
                      
                      # 尝试找到对应的动作
                      line = match.string
                      exercise_name = ""
                      for key in rm_map.keys():
                          if key in line.lower():
                              exercise_name = key
                              break
                      
                      if exercise_name:
                          exercise_key = rm_map[exercise_name]
                          if exercise_key in RM_DATA:
                              rm = RM_DATA[exercise_key]
                              weight = round(float(rm) * float(pct) / 100 / 2.5) * 2.5
                              return f"{pct}% 1RM ({weight}kg)"
                      return match.group(0)
                  return match.group(0)
              
              result = text
              for pattern in patterns:
                  result = re.sub(pattern, replace, result, flags=re.IGNORECASE)
              
              return result

          # 处理场馆计划中的1RM百分比
          if gym_plan:
              gym_plan = calculate_weights(gym_plan)

          # 生成消息
          lines_msg = []
          lines_msg.append(f"🏋️ DIMI训练提醒 ({today.strftime('%Y-%m-%d')} {target_weekday_cn})")
          lines_msg.append("")
          lines_msg.append("### 📋 今日训练计划")
          lines_msg.append("")

          if gym_plan:
              lines_msg.append("**场馆计划:**")
              lines_msg.append(gym_plan)
              lines_msg.append("")

          if extra_plan:
              lines_msg.append("**课后加练:**")
              lines_msg.append(extra_plan)
              lines_msg.append("")

          if recovery_plan:
              lines_msg.append("**恢复重点:**")
              lines_msg.append(recovery_plan)
              lines_msg.append("")

          if notes_plan:
              lines_msg.append("**练习要点:**")
              lines_msg.append(notes_plan)
              lines_msg.append("")

          # 不添加1RM参考数据（已删除）
          lines_msg.append("💪 加油！")

          message = '\n'.join(lines_msg)
          print(f"✓ 消息生成完成，长度: {len(message)}字符")

          # 发送钉钉消息
          headers = {"Content-Type": "application/json"}
          payload = {
              "msgtype": "markdown",
              "markdown": {
                  "title": f"训练提醒 {today.strftime('%Y-%m-%d')}",
                  "text": message
              }
          }

          try:
              response = requests.post(dingtalk_webhook, headers=headers, json=payload, timeout=10)
              if response.status_code == 200:
                  result = response.json()
                  if result.get("errcode") == 0:
                      print("✅ 训练提醒发送成功！")
                  else:
                      print(f"✗ 钉钉发送失败: {result.get('errmsg')}")
              else:
                  print(f"✗ 钉钉发送失败: HTTP {response.status_code}")
          except Exception as e:
              print(f"✗ 发送消息失败: {e}")
              sys.exit(1)
          EOF
        continue-on-error: false
