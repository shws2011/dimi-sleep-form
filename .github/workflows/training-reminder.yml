name: DIMI Training Reminder

on:
  schedule:
    # 周一到周五上午11:00 (UTC+8)
    - cron: '0 3 * * 1-5'
    # 周六上午9:00 (UTC+8)
    - cron: '0 1 * * 6'
  workflow_dispatch:

jobs:
  send-training-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Generate and send reminder
        run: |
          python << 'EOF'
          import os, base64, requests
          from datetime import datetime
          
          # 硬编码配置（请替换为真实值）
          GITEE_TOKEN = "ed4425ff9eae674d02248852bcb8fd63"  # 替换为您的Gitee个人访问令牌
          DINGTALK_WEBHOOK = "https://oapi.dingtalk.com/robot/send?access_token=238cbb8ff13ea9a2ac8567a4e2c185303804906107d9bc73bb209e5584c211c9"
          
          def get_gitee_file(path):
              url = f"https://gitee.com/api/v5/repos/shws2011/dimi/contents/{path}"
              r = requests.get(url, headers={"Authorization": f"token {GITEE_TOKEN}"})
              if r.status_code == 200:
                  return base64.b64decode(r.json()["content"]).decode("utf-8")
              print(f"获取文件失败: {path}, 状态码: {r.status_code}")
              return None
          
          # 获取今天信息
          today = datetime.now()
          weekday = today.weekday()
          week_num = today.isocalendar()[1]
          
          weekdays_cn = ["周一", "周二", "周三", "周四", "周五", "周六", "周日"]
          today_cn = weekdays_cn[weekday]
          
          # 读取周计划
          content = get_gitee_file(f"memory/fitness/weekly/{today.year}-W{week_num}.md")
          
          if not content:
              # 尝试获取上周计划
              last_week = week_num - 1 if week_num > 1 else 52
              content = get_gitee_file(f"memory/fitness/weekly/{today.year}-W{last_week}.md")
              
              if not content:
                  message = "本周训练计划未设置，请发送本周计划。"
              else:
                  message = "本周训练计划未设置，使用上周计划。"
          else:
              # 解析今日计划
              lines = content.split("\n")
              plan = {"main": "", "extra": "", "recovery": ""}
              in_today = False
              
              for i, line in enumerate(lines):
                  line = line.strip()
                  if f"## {today_cn}" in line or line.startswith(f"2026/04/") and today_cn in line:
                      in_today = True
                      continue
                  if in_today and line.startswith("## ") and today_cn not in line:
                      break
                  if in_today:
                      if "WOD:" in line:
                          plan["main"] = line
                      elif "加练" in line:
                          plan["extra"] = line
                      elif "恢复" in line:
                          plan["recovery"] = line
              
              # 生成消息
              message = f"""DIMI训练提醒 ({today.strftime('%Y-%m-%d')} {today_cn})

主课：{plan['main'] or '无'}
加练：{plan['extra'] or '无'}
恢复：{plan['recovery'] or '无'}

提示：
1. 查看睡眠数据分析
2. 根据体感调整训练强度
3. 训练后及时反馈

加油！
查看睡眠数据：https://dimi-sleep-form.vercel.app/"""
          
          # 发送钉钉
          response = requests.post(DINGTALK_WEBHOOK, json={
              "msgtype": "text",
              "text": {"content": message}
          })
          print("已发送:", message)
          print("钉钉响应:", response.text)
          EOF
