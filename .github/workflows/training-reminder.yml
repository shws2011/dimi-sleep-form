name: Training Reminder
on:
  schedule:
    - cron: '0 1 * * 1-5'  # 工作日 UTC 01:00（北京时间09:00）
    - cron: '0 23 * * 6'   # 周六 UTC 23:00（北京时间07:00）
  workflow_dispatch:  # 手动触发

env:
  GITEE_TOKEN: 'ed4425ff9eae674d02248852bcb8fd63'
  DINGTALK_WEBHOOK: 'https://oapi.dingtalk.com/robot/send?access_token=238cbb8ff13ea9a2ac8567a4e2c185303804906107d9bc73bb209e5584c211c9'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Generate and send training reminder
        env:
          GITEE_TOKEN: ${{ env.GITEE_TOKEN }}
          DINGTALK_WEBHOOK: ${{ env.DINGTALK_WEBHOOK }}
        run: |
          python << 'EOF'
          import os
          import sys
          import json
          import re
          import requests
          import base64
          from datetime import datetime

          # 1RM数据
          RM_DATA = {
              "front_squat": 90,
              "bench_press": 80,
              "clean_jerk": 50,
              "push_press": 55,
              "snatch": 50,
              "squat_clean": 70,
              "back_squat": 110,
              "deadlift": 120
          }

          # 检查必要的环境变量
          token = os.environ.get("GITEE_TOKEN")
          dingtalk_webhook = os.environ.get("DINGTALK_WEBHOOK")

          if not token:
              print("错误: GITEE_TOKEN未设置")
              sys.exit(1)

          if not dingtalk_webhook:
              print("错误: DINGTALK_WEBHOOK未设置")
              sys.exit(1)

          # 获取本周训练计划文件（转换为北京时间）
          from datetime import timezone, timedelta
          
          # 定义北京时间时区 (UTC+8)
          beijing_tz = timezone(timedelta(hours=8))
          
          # 将UTC时间转换为北京时间
          utc_now = datetime.now(timezone.utc)
          today = utc_now.astimezone(beijing_tz)
          
          year, week_num, _ = today.isocalendar()
          file_prefix = f"{year}-W{week_num:02d}"
          
          # 查找正确的文件路径
          file_path = None
          content = None
          
          # 1. 先尝试本地查找
          weekly_dir = "memory/fitness/weekly"
          if os.path.exists(weekly_dir):
              try:
                  files = os.listdir(weekly_dir)
                  for filename in files:
                      if filename.startswith(file_prefix) and filename.endswith('.md'):
                          file_path = os.path.join(weekly_dir, filename)
                          break
              except Exception as e:
                  print(f"⚠️ 读取本地目录异常: {e}")
          
          # 2. 如果本地找到了文件，读取它
          if file_path and os.path.exists(file_path):
              try:
                  with open(file_path, 'r', encoding='utf-8') as f:
                      content = f.read()
                  print(f"✓ 成功读取本地训练计划文件: {file_path}")
              except Exception as e:
                  print(f"⚠️ 读取本地文件异常: {e}")
                  file_path = None
          
          # 3. 如果本地没有找到或读取失败，从Gitee查找
          if not content:
              # 先列出目录内容
              dir_url = f"https://gitee.com/api/v5/repos/shws2011/dimi/contents/memory/fitness/weekly"
              params = {"access_token": token, "ref": "main"}
              
              try:
                  response = requests.get(dir_url, params=params, timeout=10)
                  if response.status_code == 200:
                      dir_contents = response.json()
                      if isinstance(dir_contents, list):
                          for item in dir_contents:
                              if item.get("type") == "file" and item.get("name", "").startswith(file_prefix) and item.get("name", "").endswith('.md'):
                                  file_path = f"memory/fitness/weekly/{item.get('name')}"
                                  break
              except Exception as e:
                  print(f"⚠️ 列出Gitee目录异常: {e}")
              
              # 如果找到了文件，读取它
              if file_path:
                  url = f"https://gitee.com/api/v5/repos/shws2011/dimi/contents/{file_path}"
                  try:
                      response = requests.get(url, params=params, timeout=10)
                      if response.status_code == 200:
                          data = response.json()
                          if isinstance(data, dict) and "content" in data:
                              content = base64.b64decode(data["content"]).decode('utf-8')
                              print(f"✓ 成功从Gitee获取训练计划文件: {file_path}")
                          else:
                              print("✗ Gitee返回的数据格式不正确")
                              sys.exit(1)
                      else:
                          print(f"✗ 无法获取计划文件: HTTP {response.status_code}")
                          sys.exit(1)
                  except Exception as e:
                      print(f"✗ 获取计划文件异常: {e}")
                      sys.exit(1)
              else:
                  # 如果找不到任何文件，尝试精确匹配
                  file_path = f"memory/fitness/weekly/{file_prefix}.md"
                  url = f"https://gitee.com/api/v5/repos/shws2011/dimi/contents/{file_path}"
                  try:
                      response = requests.get(url, params=params, timeout=10)
                      if response.status_code == 200:
                          data = response.json()
                          if isinstance(data, dict) and "content" in data:
                              content = base64.b64decode(data["content"]).decode('utf-8')
                              print(f"✓ 成功从Gitee获取训练计划文件: {file_path}")
                          else:
                              print("✗ Gitee返回的数据格式不正确")
                              sys.exit(1)
                      else:
                          print(f"✗ 无法获取计划文件: HTTP {response.status_code}")
                          sys.exit(1)
                  except Exception as e:
                      print(f"✗ 获取计划文件异常: {e}")
                      sys.exit(1)

          # 解析今日计划
          chinese_weekdays = ["周一", "周二", "周三", "周四", "周五", "周六", "周日"]
          target_weekday_cn = chinese_weekdays[today.weekday()]
          print(f"✓ 今日: {target_weekday_cn}")

          lines = content.split('\n')
          daily_content = []
          in_target_section = False

          for line in lines:
              line_stripped = line.strip()
              if target_weekday_cn in line_stripped and line_stripped.startswith('## '):
                  in_target_section = True
                  continue

              if in_target_section and line_stripped.startswith('## ') and target_weekday_cn not in line_stripped:
                  break

              if in_target_section:
                  daily_content.append(line)

          if not daily_content:
              print(f"✗ 未找到今日训练计划 ({target_weekday_cn})")
              simple_message = f"🏋️ DIMI训练提醒 ({today.strftime('%Y-%m-%d')} {target_weekday_cn})\n\n今日训练计划未找到，请检查周计划文件。\n\n💪 加油！"
              payload = {
                  "msgtype": "markdown",
                  "markdown": {
                      "title": "训练提醒",
                      "text": simple_message
                  }
              }

              try:
                  resp = requests.post(dingtalk_webhook, json=payload, timeout=10)
                  if resp.status_code == 200:
                      print("✓ 已发送简单提醒消息")
                  else:
                      print(f"✗ 发送失败: HTTP {resp.status_code}")
              except Exception as e:
                  print(f"✗ 发送消息异常: {e}")

              sys.exit(0)

          plan_text = '\n'.join(daily_content)
          print(f"✓ 提取到计划内容: {len(plan_text)}字符")

          # 提取各部分
          def extract_section(title, text):
              lines = text.split('\n')
              section_lines = []
              in_section = False

              for line in lines:
                  line_stripped = line.strip()
                  if f"### {title}" in line_stripped:
                      in_section = True
                      continue

                  if in_section and line_stripped.startswith('### '):
                      break

                  if in_section:
                      section_lines.append(line)

              return '\n'.join(section_lines).strip()

          gym_plan = extract_section("场馆计划", plan_text)
          extra_plan = extract_section("课后加练", plan_text)
          recovery_plan = extract_section("恢复重点", plan_text)
          notes_plan = extract_section("练习要点", plan_text)

          print(f"✓ 解析成功: 场馆计划({len(gym_plan)}字符), 课后加练({len(extra_plan)}字符), 恢复重点({len(recovery_plan)}字符)")

          if not gym_plan:
              print("✗ 未找到场馆计划")
              sys.exit(1)

          # 计算1RM百分比
          def calculate_weights(text):
              if not text:
                  return text

              rm_map = {
                  'front squat': 'front_squat',
                  'bench press': 'bench_press',
                  'clean & jerk': 'clean_jerk',
                  'power clean & jerk': 'clean_jerk',
                  'push press': 'push_press',
                  'snatch': 'snatch',
                  'power snatch': 'snatch',
                  'squat clean': 'squat_clean',
                  'back squat': 'back_squat',
                  'deadlift': 'deadlift'
              }

              # 找到对应的动作
              exercise_key = None
              text_lower = text.lower()
              for key, value in rm_map.items():
                  if key in text_lower:
                      exercise_key = value
                      break

              if not exercise_key or exercise_key not in RM_DATA:
                  return text

              rm = RM_DATA[exercise_key]

              # 处理 @ 范围百分比格式 (@ 80-85%) - 先匹配这个！
              if re.search(r'@\s*[\d.]+-[\d.]+%', text):
                  result = text
                  for match in re.finditer(r'@\s*([\d.]+)-([\d.]+)%', text):
                      min_pct = match.group(1)
                      max_pct = match.group(2)
                      min_weight = round(rm * float(min_pct) / 100 / 2.5) * 2.5
                      max_weight = round(rm * float(max_pct) / 100 / 2.5) * 2.5
                      result = result.replace(match.group(0), f"@ {min_pct}-{max_pct}% ({min_weight}-{max_weight}kg)")
                  return result

              # 处理 @ 单个百分比格式 (@ 82.5%)
              if re.search(r'@\s*[\d.]+%', text):
                  result = text
                  for match in re.finditer(r'@\s*([\d.]+)%', text):
                      pct = match.group(1)
                      weight = round(rm * float(pct) / 100 / 2.5) * 2.5
                      result = result.replace(match.group(0), f"@{pct}% ({weight}kg)")
                  return result

              # 处理连续百分比格式 (70%-70%-75%-75%-80% 1RM)
              if re.search(r'\d+%-+\d+%', text):
                  pattern = r'([\d%-]+%\s*1RM)\s*(?:\([\d.]+\s*kg\))?\s*'
                  match = re.search(pattern, text)
                  if match:
                      pct_part = match.group(1).replace('1RM', '').strip()
                      rest = text[match.end():]

                      percentages = pct_part.split('-')

                      calculated = []
                      for pct in percentages:
                          pct = pct.strip()
                          if pct.endswith('%'):
                              pct = pct[:-1]
                          if pct.replace('.', '').isdigit():
                              pct_float = float(pct)
                              weight = round(rm * pct_float / 100 / 2.5) * 2.5
                              calculated.append(f"{pct}% 1RM ({weight}kg)")

                      if calculated:
                          result = text[:match.start()] + " + ".join(calculated) + (rest if rest.startswith(' ') or rest == '' else ' ' + rest)
                          return result

              # 处理逗号分隔的多个百分比 (68%1RM, 70%1RM, 73%1RM, 76%1RM)
              if re.search(r'\d+%1RM(,\s*\d+%1RM)+', text):
                  result = text
                  # 逐个替换每个百分比
                  for match in re.finditer(r'(\d+)%1RM', text):
                      pct = match.group(1)
                      weight = round(rm * float(pct) / 100 / 2.5) * 2.5
                      result = result.replace(match.group(0), f"{pct}% 1RM ({weight}kg)")
                  return result

              # 处理范围百分比格式 (60-65% 1RM)
              pattern = r'(\d+)-(\d+)%\s*1RM\s*(?:\([\d.]+\s*-\s*[\d.]+\s*kg\))?\s*'
              match = re.search(pattern, text)
              if match:
                  min_pct = match.group(1)
                  max_pct = match.group(2)
                  rest = text[match.end():]

                  min_weight = round(rm * float(min_pct) / 100 / 2.5) * 2.5
                  max_weight = round(rm * float(max_pct) / 100 / 2.5) * 2.5

                  result = text[:match.start()] + f"{min_pct}-{max_pct}% 1RM ({min_weight}-{max_weight}kg)" + (rest if rest.startswith(' ') or rest == '' else ' ' + rest)
                  return result

              # 处理单个百分比格式 (80% 1RM)
              pattern = r'(\d+)%\s*1RM\s*(?:\([\d.]+\s*kg\))?\s*'
              match = re.search(pattern, text)
              if match:
                  pct = match.group(1)
                  rest = text[match.end():]

                  weight = round(rm * float(pct) / 100 / 2.5) * 2.5
                  result = text[:match.start()] + f"{pct}% 1RM ({weight}kg)" + (rest if rest.startswith(' ') or rest == '' else ' ' + rest)
                  return result

              return text

          # 处理场馆计划中的1RM百分比
          if gym_plan:
              gym_plan = calculate_weights(gym_plan)

          # 构建消息
          lines_msg = []
          lines_msg.append(f"🏋️ DIMI训练提醒 ({today.strftime('%Y-%m-%d')} {target_weekday_cn})")
          lines_msg.append("")
          lines_msg.append("### 📋 今日训练计划")
          lines_msg.append("")

          if gym_plan:
              lines_msg.append("**场馆计划:**")
              lines_msg.append(gym_plan)
              lines_msg.append("")

          if extra_plan:
              lines_msg.append("**课后加练:**")
              lines_msg.append(extra_plan)
              lines_msg.append("")

          if recovery_plan:
              lines_msg.append("**恢复重点:**")
              lines_msg.append(recovery_plan)
              lines_msg.append("")

          if notes_plan:
              lines_msg.append("**练习要点:**")
              lines_msg.append(notes_plan)
              lines_msg.append("")

          # 添加健康状态调整
          try:
              import csv
              health_data_path = "memory/fitness/health_data.csv"
              if os.path.exists(health_data_path):
                  with open(health_data_path, 'r', encoding='utf-8-sig') as f:
                      reader = csv.reader(f)
                      rows = list(reader)
                      if len(rows) > 1:
                          latest = rows[-1]
                          if len(latest) >= 8:
                              physical_recovery = int(latest[7])

                              lines_msg.append("### 📊 健康状态调整")
                              if physical_recovery < 50:
                                  lines_msg.append("⚠️ 体力恢复不足，建议降低强度20-30%")
                              elif physical_recovery < 70:
                                  lines_msg.append("⚡ 体力恢复一般，建议降低强度10-20%")
                              else:
                                  lines_msg.append("✅ 体力恢复良好，可按计划执行")
                              lines_msg.append("")
          except Exception as e:
              print(f"⚠️ 读取健康数据异常: {e}")

          # 不添加1RM参考数据（已删除）
          lines_msg.append("💪 加油！")

          message = '\n'.join(lines_msg)
          print(f"✓ 消息生成完成，长度: {len(message)}字符")

          # 发送钉钉消息
          headers = {"Content-Type": "application/json"}
          payload = {
              "msgtype": "markdown",
              "markdown": {
                  "title": f"训练提醒 {today.strftime('%Y-%m-%d')}",
                  "text": message
              }
          }

          try:
              response = requests.post(dingtalk_webhook, headers=headers, json=payload, timeout=10)
              if response.status_code == 200:
                  result = response.json()
                  if result.get("errcode") == 0:
                      print("✅ 训练提醒发送成功！")
                  else:
                      print(f"✗ 钉钉发送失败: {result.get('errmsg')}")
                      sys.exit(1)
              else:
                  print(f"✗ 钉钉发送失败: HTTP {response.status_code}")
                  sys.exit(1)
          except Exception as e:
              print(f"✗ 发送消息失败: {e}")
              sys.exit(1)
          EOF
        continue-on-error: false
