name: DIMI Training Reminder

on:
  schedule:
    - cron: '0 3 * * 1-5'  # 周一到周五 11:00
    - cron: '0 1 * * 6'    # 周六 9:00
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install requests
      - run: |
          python << 'EOF'
          import requests, base64, datetime
          
          token = "ed4425ff9eae674d02248852bcb8fd63"  # 替换为真实token
          webhook = "https://oapi.dingtalk.com/robot/send?access_token=238cbb8ff13ea9a2ac8567a4e2c185303804906107d9bc73bb209e5584c211c9"
          
          today = datetime.datetime.now()
          week_num = today.isocalendar()[1]
          weekday = today.weekday()
          weekdays = ["周一", "周二", "周三", "周四", "周五", "周六", "周日"]
          today_cn = weekdays[weekday]
          
          # 读取周计划
          url = f"https://gitee.com/api/v5/repos/shws2011/dimi/contents/memory/fitness/weekly/{today.year}-W{week_num}.md"
          r = requests.get(url, headers={"Authorization": f"token {token}"})
          
          if r.status_code == 200:
              content = base64.b64decode(r.json()["content"]).decode("utf-8")
              lines = content.split("\n")
              plan = {"main": ""}
              in_today = False
              for line in lines:
                  if f"## {today_cn}" in line:
                      in_today = True
                  elif in_today and line.startswith("## "):
                      break
                  elif in_today and "WOD:" in line:
                      plan["main"] = line
              message = f"DIMI训练提醒 ({today.strftime('%Y-%m-%d')} {today_cn})\n\n主课：{plan['main'] or '无'}\n\n加油！"
          else:
              message = "本周训练计划未设置，请发送本周计划。"
          
          # 发送钉钉
          requests.post(webhook, json={
              "msgtype": "text",
              "text": {"content": message}
          })
          print("已发送:", message)
          EOF
