name: Training Reminder

on:
  schedule:
    # 工作日11:00 = UTC 3:00 (周一至周五)（提前2小时以补偿延迟，实际约11:00-13:00收到）
    - cron: '0 1 * * 1,2,3,4,5'
    # 周六9:00 = UTC 1:00（提前2小时以补偿延迟，实际约9:00-11:00收到）
    - cron: '0 23 * * 5'
  workflow_dispatch:

jobs:
  send-training-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Generate training reminder message
        id: generate
        run: |
          MESSAGE=$(node scripts/generate-training-reminder.js | grep -A 1000 '=== MESSAGE START ===' | grep -B 1000 '=== MESSAGE END ===' | head -n -1 | tail -n +2)
          # 转义特殊字符用于JSON
          MESSAGE_ESCAPED=$(echo "$MESSAGE" | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
          echo "message=$MESSAGE_ESCAPED" >> $GITHUB_OUTPUT
          echo "Generated message:"
          echo "$MESSAGE"

      - name: Send Training Reminder to DingTalk
        run: |
          MESSAGE="${{ steps.generate.outputs.message }}"
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"DIMI训练提醒\",
                \"text\": \"$MESSAGE\"
              }
            }" \
            https://oapi.dingtalk.com/robot/send?access_token=238cbb8ff13ea9a2ac8567a4e2c185303804906107d9bc73bb209e5584c211c9
