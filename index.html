<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIMI 睡眠数据表单 v2.0 - 新格式</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: linear-gradient(90deg, #4f6df5, #3a56d5);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .version-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .content {
            padding: 30px;
        }

        .form-section {
            margin-bottom: 30px;
            padding: 25px;
            background: #f8f9ff;
            border-radius: 15px;
            border-left: 5px solid #4f6df5;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .form-section h2 {
            color: #3a56d5;
            margin-bottom: 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-section h2 i {
            color: #4f6df5;
        }

        .field-order {
            background: #e8eeff;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #3a56d5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 1rem;
        }

        .form-group .value-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .form-group .value-display span {
            font-weight: 600;
            color: #4f6df5;
        }

        input[type="range"] {
            width: 100%;
            height: 12px;
            -webkit-appearance: none;
            appearance: none;
            background: #e0e0e0;
            border-radius: 10px;
            outline: none;
            margin: 10px 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #4f6df5;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2);
            transition: all 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background: #3a56d5;
            transform: scale(1.1);
        }

        input[type="number"], input[type="date"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input[type="number"]:focus, input[type="date"]:focus {
            border-color: #4f6df5;
            box-shadow: 0 0 0 3px rgba(79, 109, 245, 0.2);
            outline: none;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-width: 180px;
        }

        .btn-primary {
            background: linear-gradient(90deg, #4f6df5, #3a56d5);
            color: white;
            box-shadow: 0 5px 15px rgba(79, 109, 245, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(79, 109, 245, 0.4);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f8f9ff;
            color: #4f6df5;
            border: 2px solid #4f6df5;
        }

        .btn-secondary:hover {
            background: #eef1ff;
            transform: translateY(-3px);
        }

        .status-message {
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            font-weight: 600;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4f6df5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.9rem;
            border-top: 1px solid #eee;
            background: #f8f9ff;
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .button-group {
                flex-direction: column;
                gap: 15px;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-moon"></i> DIMI 睡眠数据收集系统</h1>
            <p>记录您的睡眠数据，优化训练计划 - GitHub Pages 集成版本</p>
            <div class="version-badge">v2.0 新格式</div>
        </div>
        
        <div class="content">
            <form id="sleepForm">
                <!-- 基本信息部分 -->
                <div class="form-section">
                    <h2><i class="fas fa-user-circle"></i> 基本信息</h2>
                    
                    <div class="form-group">
                        <label for="date">记录日期</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                </div>
                
                <!-- 睡眠时长 -->
                <div class="form-section">
                    <h2><i class="fas fa-clock"></i> 睡眠时长</h2>
                    <div class="field-order">请按顺序填写以下数据项</div>
                    
                    <div class="form-group">
                        <div class="value-display">
                            <label for="sleepDuration">总睡眠时长 (小时)</label>
                            <span id="durationValue">7.5</span>
                        </div>
                        <input type="range" id="sleepDuration" name="sleepDuration" min="4" max="12" step="0.1" value="7.5" oninput="updateDurationValue(this.value)">
                    </div>
                </div>
                
                <!-- 睡眠阶段比例 -->
                <div class="form-section">
                    <h2><i class="fas fa-bed"></i> 睡眠阶段比例</h2>
                    <div class="field-order">请按以下顺序填写：清醒比例 → REM比例 → 浅睡比例 → 深睡比例 → 清醒5分钟次数 → 静息心率</div>
                    
                    <div class="form-group">
                        <div class="value-display">
                            <label for="awakePercentage">清醒比例 (%)</label>
                            <span id="awakeValue">10</span>
                        </div>
                        <input type="range" id="awakePercentage" name="awakePercentage" min="0" max="30" step="1" value="10" oninput="updateAwakeValue(this.value)">
                    </div>
                    
                    <div class="form-group">
                        <div class="value-display">
                            <label for="remSleep">REM比例 (%)</label>
                            <span id="remValue">20</span>
                        </div>
                        <input type="range" id="remSleep" name="remSleep" min="10" max="35" step="1" value="20" oninput="updateRemValue(this.value)">
                    </div>
                    
                    <div class="form-group">
                        <div class="value-display">
                            <label for="lightSleep">浅睡比例 (%)</label>
                            <span id="lightValue">45</span>
                        </div>
                        <input type="range" id="lightSleep" name="lightSleep" min="30" max="60" step="1" value="45" oninput="updateLightValue(this.value)">
                    </div>
                    
                    <div class="form-group">
                        <div class="value-display">
                            <label for="deepSleep">深睡比例 (%)</label>
                            <span id="deepValue">25</span>
                        </div>
                        <input type="range" id="deepSleep" name="deepSleep" min="5" max="50" step="1" value="25" oninput="updateDeepValue(this.value)">
                    </div>
                    
                    <div class="form-group">
                        <label for="awake5minCount">清醒5分钟次数 (次)</label>
                        <input type="number" id="awake5minCount" name="awake5minCount" min="0" max="20" value="2" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="restingHeartRate">静息心率 (bpm)</label>
                        <input type="number" id="restingHeartRate" name="restingHeartRate" min="40" max="100" value="60" required>
                    </div>
                </div>
                
                <!-- 生理指标 -->
                <div class="form-section">
                    <h2><i class="fas fa-heartbeat"></i> 生理指标</h2>
                    <div class="field-order">请按以下顺序填写：HRV → 体重 → 体脂率</div>
                    
                    <div class="form-group">
                        <label for="hrv">HRV (ms)</label>
                        <input type="number" id="hrv" name="hrv" min="20" max="150" value="50" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="weight">体重 (kg)</label>
                        <input type="number" id="weight" name="weight" min="40" max="150" step="0.1" value="70" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="bodyFat">体脂率 (%)</label>
                        <input type="number" id="bodyFat" name="bodyFat" min="5" max="40" step="0.1" value="18" required>
                    </div>
                </div>
                
                <!-- 提交按钮 -->
                <div class="button-group">
                    <button type="button" class="btn btn-secondary" onclick="previewData()">
                        <i class="fas fa-eye"></i> 预览数据
                    </button>
                    
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <i class="fas fa-paper-plane"></i> 提交数据到 Gitee
                    </button>
                </div>
                
                <div id="statusMessage" class="status-message"></div>
            </form>
        </div>
        
        <footer>
            <p>DIMI 健身自动化系统 &copy; 2026 | 数据将提交到 <a href="https://gitee.com" target="_blank">Gitee 仓库</a></p>
            <p>GitHub Pages 托管版本 | 最后更新: 2026-03-04 | 新格式版本</p>
        </footer>
    </div>

    <script>
        // ============================================
        // 配置信息 - Vercel Serverless Function
        // ============================================
        const CONFIG = {
            // Vercel API地址
            SCF_API_URL: 'https://dimi-sleep-form.vercel.app/api/submit-sleep-data'
        };

        // 设置默认日期为今天
        document.getElementById('date').valueAsDate = new Date();
        
        // 更新滑块显示值的函数
        function updateDurationValue(val) {
            document.getElementById('durationValue').textContent = val;
        }
        
        function updateAwakeValue(val) {
            document.getElementById('awakeValue').textContent = val;
        }
        
        function updateRemValue(val) {
            document.getElementById('remValue').textContent = val;
        }
        
        function updateLightValue(val) {
            document.getElementById('lightValue').textContent = val;
        }
        
        function updateDeepValue(val) {
            document.getElementById('deepValue').textContent = val;
        }
        
        // 显示状态消息
        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.innerHTML = message;
            statusDiv.className = 'status-message status-' + type;
            statusDiv.style.display = 'block';
        }
        
        // 隐藏状态消息
        function hideStatus() {
            document.getElementById('statusMessage').style.display = 'none';
        }
        
        // 设置提交按钮状态
        function setSubmitButton(loading) {
            const btn = document.getElementById('submitBtn');
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading-spinner"></span>提交中...';
            } else {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> 提交数据到 Gitee';
            }
        }
        
        // 预览数据
        function previewData() {
            const data = collectFormData();
            alert('数据预览：\n' + JSON.stringify(data, null, 2));
        }
        
        // 收集表单数据
        function collectFormData() {
            return {
                date: document.getElementById('date').value,
                sleepDuration: parseFloat(document.getElementById('sleepDuration').value),
                awakePercentage: parseInt(document.getElementById('awakePercentage').value),
                remSleep: parseInt(document.getElementById('remSleep').value),
                lightSleep: parseInt(document.getElementById('lightSleep').value),
                deepSleep: parseInt(document.getElementById('deepSleep').value),
                awake5minCount: parseInt(document.getElementById('awake5minCount').value),
                restingHeartRate: parseInt(document.getElementById('restingHeartRate').value),
                hrv: parseInt(document.getElementById('hrv').value),
                weight: parseFloat(document.getElementById('weight').value),
                bodyFat: parseFloat(document.getElementById('bodyFat').value),
                timestamp: new Date().toISOString()
            };
        }
        
        // 验证数据
        function validateData(data) {
            // 检查睡眠阶段比例总和
            const totalPercentage = data.awakePercentage + data.remSleep + data.lightSleep + data.deepSleep;
            if (totalPercentage < 95 || totalPercentage > 105) {
                return {
                    valid: false,
                    message: '睡眠阶段比例总和为 ' + totalPercentage + '%，应在95%-105%之间，请检查数据'
                };
            }
            return { valid: true };
        }
        
        // 提交表单
        async function submitForm(event) {
            event.preventDefault();
            hideStatus();
            
            // 收集数据
            const formData = collectFormData();
            
            // 验证数据
            const validation = validateData(formData);
            if (!validation.valid) {
                showStatus(validation.message, 'error');
                return;
            }
            
            // 设置按钮为加载状态
            setSubmitButton(true);
            showStatus('<span class="loading-spinner"></span>正在提交数据到 Gitee...', 'loading');
            
            try {
                // 调用腾讯云SCF函数
                const response = await fetch(CONFIG.SCF_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    showStatus('✅ 数据提交成功！已保存到 Gitee 仓库。', 'success');
                    
                    // 3秒后重置表单
                    setTimeout(() => {
                        document.getElementById('sleepForm').reset();
                        document.getElementById('date').valueAsDate = new Date();
                        updateDurationValue(7.5);
                        updateAwakeValue(10);
                        updateRemValue(20);
                        updateLightValue(45);
                        updateDeepValue(25);
                        hideStatus();
                    }, 3000);
                } else {
                    showStatus('❌ 提交失败: ' + (result.error || result.message || '未知错误'), 'error');
                }
            } catch (error) {
                console.error('提交错误:', error);
                showStatus('❌ 提交失败: ' + error.message + '<br>请检查网络连接或联系管理员', 'error');
            } finally {
                setSubmitButton(false);
            }
        }
        
        // 绑定表单提交事件
        document.getElementById('sleepForm').addEventListener('submit', submitForm);
    </script>
</body>
</html>
